version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: telemetry_service
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
    command: >
      sh -c "uvicorn src.main:app --host ${APP_HOST} --port ${APP_PORT}"
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: telemetry_postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: telemetry_redis
    env_file:
      - .env
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: